name: stock-price-service CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - stock-price-service/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.ACTION_TOKEN }}
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: corretto
          cache: maven
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - run: |
          cd stock-price-service
          mvn install
          mvn jib:build -pl stock-price-container
  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - run: |
          kubectl rollout restart deployment stock-service-deployment
