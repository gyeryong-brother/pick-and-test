name: config-service CI

on:
  push:
    paths:
      - config-service/**
  pull_request:
    paths:
      - config-service/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "corretto"
          cache: maven
      - run: |
          cd config-service
          mvn package
