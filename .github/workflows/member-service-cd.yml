name: member-service CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - member-service/**
      - .github/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTION_TOKEN }}
          submodules: true
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: corretto
          cache: maven
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - run: |
          cd member-service
          mvn install
          mvn jib:build -pl member-container
  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - run: |
          cd /home/ubuntu/pick-and-test-server
          sudo docker compose -f backend-compose.yml pull member-service
          sudo docker compose -f backend-compose.yml up member-service -d
