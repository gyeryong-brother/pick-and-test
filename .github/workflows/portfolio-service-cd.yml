name: portfolio-service CD

on:
  push:
    branches:
      - main
      - develop
      - refactor/#83-test
    paths:
      - portfolio-service/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: corretto
          cache: maven
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - run: |
          cd portfolio-service
          mvn install
          mvn jib:build -pl portfolio-container
  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - run: sh /home/ubuntu/pick-and-test-server/actions-runner/portfolio-service/deploy.sh
