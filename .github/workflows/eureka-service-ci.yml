name: eureka-service CI

on:
  push:
    paths:
      - eureka-service/**
  pull_request:
    paths:
      - eureka-service/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "corretto"
          cache: maven
      - working-directory: ${{ github.workspace }}/eureka-service
        run: |
          mvn package
