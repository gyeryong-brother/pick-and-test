name: stock-service CI

on:
  push:
    paths:
      - stock-service/**
  pull_request:
    paths:
      - stock-service/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: maven
      - run: |
          cd stock-service
          mvn package
