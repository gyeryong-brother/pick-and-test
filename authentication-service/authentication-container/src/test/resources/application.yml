server:
  port: 8085
  servlet:
    context-path: /authentication-service

member-service:
  url: http://member-service

jwt:
  secret-key: 2ee17b50c408d0c4888e10c514d8cee5b710f1f92e397452777b12fb01fd89e3

spring:
  application:
    name: authentication-service
  config:
    import: optional:configserver:http://localhost:8888
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: 9cbbb91ff67494f8079c7753afbf6bc8
            client-secret: YD8UjUupYNRCHDIgwLMw9BjIu6HngM2D
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/authentication-service/login/oauth2/code/kakao
            client-authentication-method: client_secret_post
          naver:
            client-id: 2PO8DCsIKgyKJXkttMoV
            client-secret: ADu8hDzRcl
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/authentication-service/login/oauth2/code/naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
