server:
  port: 8080

spring:
  application:
    name: api-gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: authentication-service
          uri: lb://authentication-service
          predicates:
            - Path=/authentication-service/**

        - id: member-service
          uri: lb://member-service
          predicates:
            - Path=/member-service/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
